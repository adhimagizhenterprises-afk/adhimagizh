events { worker_connections 1024; }

http {
    # Strip CORS headers from upstream services so nginx is the single source
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    upstream auth_service       { server user-auth-service:8007; }
    upstream booking_service    { server customer-booking-service:8001; }
    upstream tracking_service   { server customer-tracking-service:8002; }
    upstream operations_service { server operations-service:8003; }
    upstream agent_service      { server agent-service:8004; }
    upstream notification_service { server notification-service:8005; }
    upstream payment_service    { server payment-service:8006; }

    server {
        listen 80;

        # CORS headers
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = OPTIONS) { return 204; }

        # Auth service
        location /api/v1/auth/ {
            proxy_pass http://auth_service/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Booking service
        location /api/v1/bookings/ {
            proxy_pass http://booking_service/api/v1/bookings/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Tracking service  
        location /api/v1/tracking/ {
            proxy_pass http://tracking_service/api/v1/tracking/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # WebSocket for live tracking
        location /ws/tracking/ {
            proxy_pass http://tracking_service/ws/tracking/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Operations service
        location /api/v1/operations/ {
            proxy_pass http://operations_service/api/v1/operations/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Agent service
        location /api/v1/agents/ {
            proxy_pass http://agent_service/api/v1/agents/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Payment service
        location /api/v1/payments/ {
            proxy_pass http://payment_service/api/v1/payments/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Notifications
        location /api/v1/notifications/ {
            proxy_pass http://notification_service/api/v1/notifications/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Health check aggregator
        location /health {
            return 200 '{"status":"ok","gateway":"swiftship"}';
            add_header Content-Type application/json;
        }
    }
}
