---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: swiftship
  labels:
    istio-injection: enabled

---
# ConfigMap for shared config
apiVersion: v1
kind: ConfigMap
metadata:
  name: swiftship-config
  namespace: swiftship
data:
  kafka-brokers: "kafka-service:9092"
  elasticsearch-url: "http://elasticsearch-service:9200"
  minio-endpoint: "minio-service:9000"
  redis-url: "redis://redis-service:6379"

---
# Secret template (replace base64 values with actual secrets)
