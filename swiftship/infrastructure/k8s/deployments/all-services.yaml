# ─── Notification Service ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: swiftship
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: swiftship/notification-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - secretRef:
                name: notification-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: swiftship
spec:
  selector:
    app: notification-service
  ports:
    - port: 8005
      targetPort: 8005
---
# ─── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: swiftship-config
  namespace: swiftship
data:
  redis-url: "redis://redis-service:6379"
  kafka-servers: "kafka-service:9092"
  elasticsearch-url: "http://elasticsearch-service:9200"
  minio-endpoint: "minio-service:9000"
---
# ─── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: swiftship
  labels:
    istio-injection: enabled
