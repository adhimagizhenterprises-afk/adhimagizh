# ─── Customer Booking Service ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-booking-service
  namespace: swiftship
  labels:
    app: customer-booking-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-booking-service
  template:
    metadata:
      labels:
        app: customer-booking-service
        version: v1
    spec:
      containers:
        - name: customer-booking-service
          image: swiftship/customer-booking-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: booking-db-secret
                  key: url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: swiftship-config
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: swiftship-config
                  key: kafka-servers
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: customer-booking-service
  namespace: swiftship
spec:
  selector:
    app: customer-booking-service
  ports:
    - port: 8001
      targetPort: 8001
---
